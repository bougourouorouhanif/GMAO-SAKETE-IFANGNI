<style>
    .sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 280px;
        height: 100dvh;
        background: linear-gradient(180deg, #0a2540 0%, #051a35 100%);
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        box-shadow: 4px 0 20px rgba(0,0,0,0.18);
        overflow: hidden;
        border-right: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar-backdrop {
        display: none;
        position: fixed; inset: 0;
        background: rgba(15,23,42,0.55);
        backdrop-filter: blur(4px);
        border: none;
        z-index: -1;
    }

    .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        flex-shrink: 0;
        background: linear-gradient(180deg, rgba(0,102,255,0.18), transparent);
    }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; }
    .sidebar-logo-mark {
        width: 40px; height: 40px;
        background: linear-gradient(135deg, #0066FF, #003f99);
        border-radius: 12px;
        display: grid; place-items: center;
        font-size: 22px;
        box-shadow: 0 4px 12px rgba(0,102,255,0.4);
        flex-shrink: 0;
    }
    .sidebar-logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .sidebar-logo span { background: linear-gradient(135deg, #5594ff, #ffd600); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sidebar-subtitle { font-size: 11px; opacity: 0.55; margin-top: 2px; }

    .sidebar-menu {
        flex: 1;
        padding: 8px 12px 16px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .sidebar-menu::-webkit-scrollbar { width: 6px; }
    .sidebar-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 999px; }

    .sidebar-section {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.4px;
        color: rgba(255,255,255,0.4);
        padding: 16px 12px 6px;
        font-weight: 700;
    }

    .sidebar-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        margin: 2px 0;
        color: rgba(255,255,255,0.78);
        text-decoration: none;
        border-radius: 10px;
        transition: background 180ms ease, color 180ms ease, transform 120ms ease;
        font-size: 14px;
        position: relative;
    }
    .sidebar-item:hover {
        background: rgba(255,255,255,0.07);
        color: #fff;
        transform: translateX(2px);
        text-decoration: none;
    }
    .sidebar-item.active {
        background: linear-gradient(90deg, rgba(0,102,255,0.25), rgba(0,102,255,0.05));
        color: #fff;
        font-weight: 600;
    }
    .sidebar-item.active::before {
        content: '';
        position: absolute; left: -12px; top: 25%;
        width: 3px; height: 50%;
        background: linear-gradient(180deg, #ffd600, #ff8a00);
        border-radius: 0 3px 3px 0;
    }

    .sidebar-item.sidebar-sub {
        padding-left: 32px;
        font-size: 13px;
        opacity: 0.78;
    }

    .sidebar-icon { width: 22px; text-align: center; font-size: 16px; flex-shrink: 0; }
    .sidebar-text { font-size: 14px; font-weight: 500; }

    .sidebar-footer {
        padding: 12px 16px 16px;
        border-top: 1px solid rgba(255,255,255,0.08);
        flex-shrink: 0;
        background: linear-gradient(0deg, rgba(0,0,0,0.25), transparent);
    }
    .sidebar-logout-btn {
        width: 100%;
        background: rgba(239,68,68,0.12);
        color: #fca5a5;
        border: 1px solid rgba(239,68,68,0.3);
        padding: 10px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 180ms, color 180ms, transform 120ms;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .sidebar-logout-btn:hover {
        background: #dc2626;
        color: #fff;
        transform: translateY(-1px);
    }
    .sidebar-logout-btn:focus-visible {
        outline: 2px solid #fca5a5; outline-offset: 2px;
    }

    @media (max-width: 768px) {
        .sidebar {
            transform: translateX(-100%);
            width: 280px;
            transition: transform 260ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar.open .sidebar-backdrop {
            display: block;
            position: fixed; inset: 0 0 0 280px;
            z-index: -1;
        }
    }
</style>

<script>
    // Active route highlight
    (function() {
        const page = window.location.pathname.split('/').pop() || 'dashboard.html';
        document.querySelectorAll('.sidebar-item').forEach(item => {
            const href = item.getAttribute('href') || '';
            if (href === page || (page === '' && href === 'dashboard.html')) {
                item.classList.add('active');
                item.setAttribute('aria-current', 'page');
            }
        });
    })();

    window.logout = function() {
        if (confirm('🚪 Voulez-vous vraiment vous déconnecter ?')) {
            localStorage.clear();
            window.location.replace('/login.html');
        }
    };

    window.toggleMobileMenu = function() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) sidebar.classList.toggle('open');
    };

    // Close mobile sidebar on backdrop click / Escape
    document.getElementById('sidebarBackdrop')?.addEventListener('click', () => {
        document.getElementById('sidebar')?.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') document.getElementById('sidebar')?.classList.remove('open');
    });
</script>
