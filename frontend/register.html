<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0066FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#001f4d" media="(prefers-color-scheme: dark)">
    <title>Inscription — GMAO Sakété</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/assets/css/design-system.css">

    <style>
        body {
            min-height: 100dvh;
            display: grid;
            place-items: start center;
            padding: var(--sp-6) var(--sp-4);
            background:
                radial-gradient(900px 500px at 0% 0%, rgba(0,102,255,0.15), transparent 60%),
                radial-gradient(800px 500px at 100% 100%, rgba(27,94,32,0.18), transparent 60%),
                var(--surface-alt);
        }
        .auth-wrap { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: var(--sp-5); }

        .brand-head { text-align: center; }
        .brand-logo {
            width: 64px; height: 64px; margin: 0 auto var(--sp-3);
            border-radius: var(--r-xl);
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: #fff; display: grid; place-items: center;
            font-size: 30px; box-shadow: var(--el-3);
        }
        .brand-head h1 { font-size: var(--fs-2xl); font-weight: var(--fw-bold); letter-spacing: -0.01em; }
        .brand-head .subtitle { color: var(--on-surface-muted); font-size: var(--fs-sm); margin-top: var(--sp-1); }

        .form-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r-2xl); padding: var(--sp-8); box-shadow: var(--el-3);
        }
        .form-card h2 { font-size: var(--fs-lg); font-weight: var(--fw-semibold); margin-bottom: var(--sp-1); }
        .form-card .form-sub { color: var(--on-surface-muted); font-size: var(--fs-sm); margin-bottom: var(--sp-5); }

        .form-row { display: grid; gap: var(--sp-3); }
        @media (min-width: 640px) { .form-row { grid-template-columns: 1fr 1fr; } }

        .field { margin-bottom: var(--sp-4); }
        .field label { display: block; font-size: var(--fs-sm); font-weight: var(--fw-medium); margin-bottom: var(--sp-2); }
        .required { color: var(--danger); }

        .input-wrap { position: relative; }
        .input-wrap .ico {
            position: absolute; left: var(--sp-4); top: 50%; transform: translateY(-50%);
            color: var(--on-surface-muted); pointer-events: none;
        }
        .input-wrap input, .input-wrap select {
            width: 100%;
            padding: var(--sp-3) var(--sp-4) var(--sp-3) calc(var(--sp-4) + 22px);
            border: 1px solid var(--border-strong);
            border-radius: var(--r-md);
            background: var(--surface);
            color: var(--on-surface);
            font-size: var(--fs-base);
            transition: border-color var(--dur-base), box-shadow var(--dur-base);
        }
        .input-wrap input:hover, .input-wrap select:hover { border-color: var(--brand-300); }
        .input-wrap input:focus-visible, .input-wrap select:focus-visible {
            border-color: var(--brand-500); box-shadow: var(--ring); outline: none;
        }
        .input-wrap select { appearance: none; cursor: pointer; }

        .password-strength {
            margin-top: var(--sp-2);
            height: 6px;
            background: var(--surface-muted);
            border-radius: var(--r-full);
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%; width: 0%;
            background: var(--danger);
            transition: width var(--dur-base), background var(--dur-base);
        }
        .strength-text {
            display: inline-block;
            font-size: var(--fs-xs);
            margin-top: var(--sp-1);
            color: var(--on-surface-muted);
        }

        .msg {
            padding: var(--sp-3) var(--sp-4); border-radius: var(--r-md);
            font-size: var(--fs-sm); margin-bottom: var(--sp-4);
            display: none; border-left: 4px solid transparent;
        }
        .error-message  { background: #fef2f2; color: #991b1b; border-left-color: var(--danger); }
        .info-message   { background: #eff6ff; color: #1e3a8a; border-left-color: var(--info); }
        .success-message{ background: #f0fdf4; color: #14532d; border-left-color: var(--success); }

        .back-link {
            display: flex; justify-content: center; gap: var(--sp-3);
            margin-top: var(--sp-4); font-size: var(--fs-sm);
        }
        .back-link a { color: var(--brand-600); font-weight: var(--fw-medium); }
        .back-link span { color: var(--on-surface-muted); }

        .loader {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
            border-top-color: #fff; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<a href="#main" class="skip-link">Aller au contenu</a>

<main id="main" class="auth-wrap">
    <header class="brand-head">
        <div class="brand-logo" aria-hidden="true">🏥</div>
        <h1>Créer un compte</h1>
        <p class="subtitle">Inscription Soignant — Hôpital de Zone Sakété-Ifangni</p>
    </header>

    <section class="form-card" aria-labelledby="reg-title">
        <h2 id="reg-title">Vos informations</h2>
        <p class="form-sub">Champs marqués d'un <span class="required">*</span> obligatoires.</p>

        <div id="registerError" class="msg error-message" role="alert" aria-live="polite"></div>
        <div id="registerSuccess" class="msg success-message" role="status" aria-live="polite"></div>
        <div id="pendingMessage" class="msg info-message">⏳ Votre compte sera activé après validation par un technicien biomédical.</div>

        <div class="form-row">
            <div class="field">
                <label for="regNom">Nom <span class="required">*</span></label>
                <div class="input-wrap"><span class="ico">👤</span><input type="text" id="regNom" autocomplete="family-name" placeholder="Votre nom"></div>
            </div>
            <div class="field">
                <label for="regPrenom">Prénom</label>
                <div class="input-wrap"><span class="ico">👤</span><input type="text" id="regPrenom" autocomplete="given-name" placeholder="Votre prénom"></div>
            </div>
        </div>

        <div class="field">
            <label for="regEmail">Email <span class="required">*</span></label>
            <div class="input-wrap"><span class="ico">📧</span><input type="email" id="regEmail" autocomplete="email" placeholder="nom@hopital.bj"></div>
        </div>

        <div class="field">
            <label for="regService">Service <span class="required">*</span></label>
            <div class="input-wrap">
                <span class="ico">🏥</span>
                <select id="regService">
                    <option value="">Sélectionnez votre service</option>
                    <option value="URGENCES">🚨 Urgences</option>
                    <option value="RADIOLOGIE">🩻 Radiologie</option>
                    <option value="BLOC_OPERATOIRE">🏥 Bloc opératoire</option>
                    <option value="PEDIATRIE">👶 Pédiatrie</option>
                    <option value="MEDECINE_INTERNE">💊 Médecine interne</option>
                    <option value="CHIRURGIE">🔪 Chirurgie</option>
                    <option value="LABORATOIRE">🔬 Laboratoire</option>
                    <option value="USI">💓 USI</option>
                    <option value="REANIMATION">🫀 Réanimation</option>
                    <option value="AUTRE">📌 Autre</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label for="regPhone">Téléphone (optionnel)</label>
            <div class="input-wrap"><span class="ico">📞</span><input type="tel" id="regPhone" autocomplete="tel" placeholder="+229 XX XX XX XX XX"></div>
        </div>

        <div class="form-row">
            <div class="field">
                <label for="regPassword">Mot de passe <span class="required">*</span></label>
                <div class="input-wrap"><span class="ico">🔒</span><input type="password" id="regPassword" autocomplete="new-password" placeholder="Minimum 6 caractères"></div>
                <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                <span class="strength-text" id="strengthText"></span>
            </div>
            <div class="field">
                <label for="regConfirmPassword">Confirmer <span class="required">*</span></label>
                <div class="input-wrap"><span class="ico">✓</span><input type="password" id="regConfirmPassword" autocomplete="new-password" placeholder="Retapez le mot de passe"></div>
            </div>
        </div>

        <button class="btn btn-primary btn-block btn-lg" id="registerBtn">📝 S'inscrire</button>

        <div class="back-link">
            <a href="login.html">🔐 Déjà un compte ?</a>
            <span>·</span>
            <a href="index.html">🏠 Accueil</a>
        </div>
    </section>
</main>

<script>
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';

    const registerBtn = document.getElementById('registerBtn');
    const passwordInput = document.getElementById('regPassword');
    const confirmInput = document.getElementById('regConfirmPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('registered') === 'true') {
        showSuccess('registerSuccess', '✅ Compte créé ! Attendez la validation du technicien.');
    }

    function hideMessages() {
        ['registerError', 'registerSuccess', 'pendingMessage'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
    }
    function showError(elementId, message) {
        const el = document.getElementById(elementId);
        if (el) { hideMessages(); el.innerHTML = message; el.style.display = 'block';
            setTimeout(() => { if (el) el.style.display = 'none'; }, 5000);
        }
    }
    function showSuccess(elementId, message) {
        const el = document.getElementById(elementId);
        if (el) { hideMessages(); el.innerHTML = message; el.style.display = 'block'; }
    }

    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        const map = {
            0: { width: '0%',   text: 'Très faible', color: '#ef4444' },
            1: { width: '20%',  text: 'Faible',      color: '#ef4444' },
            2: { width: '40%',  text: 'Moyen',       color: '#f59e0b' },
            3: { width: '60%',  text: 'Bon',         color: '#10b981' },
            4: { width: '80%',  text: 'Fort',        color: '#10b981' },
            5: { width: '100%', text: 'Très fort',   color: '#059669' }
        };
        return map[Math.min(strength, 5)];
    }
    function updatePasswordStrength() {
        const password = passwordInput.value;
        if (!password) { strengthBar.style.width = '0%'; strengthText.textContent = ''; return; }
        const r = checkPasswordStrength(password);
        strengthBar.style.width = r.width;
        strengthBar.style.backgroundColor = r.color;
        strengthText.textContent = r.text;
        strengthText.style.color = r.color;
    }
    passwordInput.addEventListener('input', updatePasswordStrength);
    confirmInput.addEventListener('input', () => {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        confirmInput.setAttribute('aria-invalid', (confirm && password !== confirm) ? 'true' : 'false');
        confirmInput.style.borderColor = (confirm && password !== confirm) ? 'var(--danger)' : '';
    });

    async function register() {
        const nom = document.getElementById('regNom').value.trim();
        const prenom = document.getElementById('regPrenom').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const service = document.getElementById('regService').value;
        const telephone = document.getElementById('regPhone').value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;

        hideMessages();

        if (!nom) return showError('registerError', 'Veuillez entrer votre nom');
        if (!email) return showError('registerError', 'Veuillez entrer votre email');
        if (!service) return showError('registerError', 'Veuillez sélectionner votre service');
        if (!password) return showError('registerError', 'Veuillez choisir un mot de passe');
        if (password !== confirmPassword) { confirmInput.focus(); return showError('registerError', 'Les mots de passe ne correspondent pas'); }
        if (password.length < 6) return showError('registerError', 'Le mot de passe doit contenir au moins 6 caractères');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) return showError('registerError', 'Email invalide (ex: nom@hopital.bj)');

        registerBtn.disabled = true;
        const originalText = registerBtn.innerHTML;
        registerBtn.innerHTML = '<span class="loader"></span> Inscription en cours...';

        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, prenom: prenom || null, email, service, telephone: telephone || null, password, role: 'SOIGNANT' })
            });
            const data = await response.json();

            if (response.ok) {
                document.getElementById('pendingMessage').style.display = 'block';
                showSuccess('registerSuccess', '✅ Inscription réussie !');
                ['regNom','regPrenom','regEmail','regService','regPhone'].forEach(id => document.getElementById(id).value = '');
                passwordInput.value = ''; confirmInput.value = '';
                strengthBar.style.width = '0%'; strengthText.textContent = '';
                setTimeout(() => { window.location.href = 'login.html?registered=true'; }, 4000);
            } else {
                showError('registerError', data.message || 'Erreur lors de l\'inscription');
            }
        } catch (error) {
            console.error('Erreur:', error);
            showError('registerError', 'Erreur de connexion. Vérifiez votre connexion internet.');
        } finally {
            registerBtn.disabled = false;
            registerBtn.innerHTML = originalText;
        }
    }

    registerBtn.addEventListener('click', register);

    ['regNom','regPrenom','regEmail','regService','regPhone','regPassword','regConfirmPassword'].forEach(id => {
        const input = document.getElementById(id);
        if (input) input.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
    });
</script>
</body>
</html>
