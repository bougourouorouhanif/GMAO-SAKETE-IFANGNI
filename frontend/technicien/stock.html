<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1b5e20">
    <title>Stock pièces - GMAO Sakété</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/assets/css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            color: #1b5e20;
            font-size: 24px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-add {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .btn-add:hover {
            background: #2e7d32;
            transform: translateY(-2px);
        }

        .btn-refresh {
            background: #f0fdf4;
            border: 1px solid #1b5e20;
            color: #1b5e20;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-refresh:hover {
            background: #1b5e20;
            color: white;
        }

        /* Statistiques */
        .stats-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 15px 20px;
            flex: 1;
            min-width: 150px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #1b5e20;
        }

        .stat-label {
            color: #64748b;
            font-size: 12px;
            margin-top: 5px;
        }

        /* Filtres */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
            background: white;
            flex: 1;
            min-width: 150px;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: #1b5e20;
        }

        .alert-btn {
            background: #ef4444;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .alert-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Tableau */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            font-size: 13px;
        }

        tr {
            transition: background 0.2s;
        }

        tr:hover {
            background: #f8fafc;
        }

        .stock-low {
            color: #dc2626;
            font-weight: bold;
            background: #fee2e2;
        }

        .stock-warning {
            color: #f97316;
            font-weight: bold;
        }

        .stock-normal {
            color: #16a34a;
        }

        .btn-mvt {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 5px;
            transition: 0.2s;
            font-size: 12px;
            font-weight: 500;
        }

        .btn-mvt:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-edit {
            background: #e2e8f0;
            color: #475569;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .btn-edit:hover {
            background: #cbd5e1;
            transform: translateY(-1px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 450px;
            width: 90%;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal h3 {
            color: #1b5e20;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: #334155;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1b5e20;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            body {
                margin-left: 0;
                padding: 70px 15px 15px 15px;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
            .btn-mvt, .btn-edit {
                padding: 4px 10px;
                font-size: 11px;
            }
            .stats-row {
                flex-direction: column;
            }
            .btn-group {
                flex-direction: column;
                width: 100%;
            }
            .btn-group button {
                width: 100%;
            }
            .filter-bar {
                flex-direction: column;
            }
            .filter-bar input, .filter-bar select, .alert-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <h1>⚙️ GESTION DU STOCK</h1>
        <div class="btn-group">
            <button class="btn-refresh" onclick="refreshAllData()">🔄 Rafraîchir</button>
            <button class="btn-add" onclick="window.location.href='piece-form.html'">➕ Ajouter une pièce</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-number" id="totalPieces">-</div>
            <div class="stat-label">📦 Références</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="valeurStock">-</div>
            <div class="stat-label">💰 Valeur totale (FCFA)</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stockFaible">-</div>
            <div class="stat-label">⚠️ Stock faible</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stockRupture">-</div>
            <div class="stat-label">❌ En rupture</div>
        </div>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher (code, désignation...)">
        <select id="categorieFilter">
            <option value="">📋 Toutes catégories</option>
            <option value="ELECTRONIQUE">🖥️ Électronique</option>
            <option value="MECANIQUE">⚙️ Mécanique</option>
            <option value="CONSOMMABLE">📦 Consommable</option>
            <option value="SONDE">🔬 Sonde</option>
            <option value="CABLE">🔌 Câble</option>
            <option value="BATTERIE">🔋 Batterie</option>
            <option value="CARTE_MERE">💻 Carte mère</option>
            <option value="AUTRE">📌 Autre</option>
        </select>
        <button class="alert-btn" onclick="filterStockFaible()">⚠️ Alertes stock</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Désignation</th>
                    <th>Catégorie</th>
                    <th>Stock</th>
                    <th>Seuil</th>
                    <th>Prix unit.</th>
                    <th>Emplacement</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" class="empty-state">⏳ Chargement des pièces...</td</tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Mouvement -->
<div id="mvtModal" class="modal" onclick="if(event.target===this) closeMvtModal()">
    <div class="modal-content">
        <h3 id="mvtTitle">Mouvement de stock</h3>
        <div class="form-group">
            <label>Quantité *</label>
            <input type="number" id="mvtQuantite" placeholder="Quantité" min="1">
        </div>
        <div class="form-group">
            <label>Motif *</label>
            <input type="text" id="mvtMotif" placeholder="Ex: Réparation, Commande, Inventaire...">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="confirmerMouvement()" style="flex:1; background:#1b5e20; color:white; border:none; border-radius:30px; padding:10px; cursor:pointer; font-weight:bold;">✅ Confirmer</button>
            <button onclick="closeMvtModal()" style="flex:1; background:#e2e8f0; border:none; border-radius:30px; padding:10px; cursor:pointer;">Annuler</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
    let currentPieceId = null;
    let currentMvtType = null;
    let searchTimeout = null;
    let onlyLowStock = false;

    function getToken() { return localStorage.getItem('token'); }
    
    // Auth check
    if (!getToken()) window.location.href = '/login.html';
    
    const userRole = localStorage.getItem('userRole');
    if (userRole !== 'TECHNICIEN') window.location.href = '/soignant/index.html';

    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                const links = document.querySelectorAll('.sidebar-item');
                links.forEach(link => {
                    if (link.getAttribute('href') === 'stock.html') {
                        link.classList.add('active');
                    }
                });
            })
            .catch(error => console.error('Erreur sidebar:', error));
    }

    async function loadStats() {
        try {
            const res = await fetch(`${API_URL}/stock/stats`, { 
                headers: { 'Authorization': `Bearer ${getToken()}` } 
            });
            if (!res.ok) throw new Error('Erreur stats');
            
            const stats = await res.json();
            document.getElementById('totalPieces').innerText = stats.totalPieces || 0;
            document.getElementById('valeurStock').innerText = (stats.valeurTotale || 0).toLocaleString();
            document.getElementById('stockFaible').innerText = stats.piecesFaibles || 0;
            document.getElementById('stockRupture').innerText = stats.piecesRupture || 0;
        } catch (error) { 
            console.error('Erreur stats:', error);
        }
    }

    async function loadPieces() {
        const search = document.getElementById('searchInput').value;
        const categorie = document.getElementById('categorieFilter').value;
        
        let url = `${API_URL}/stock?search=${encodeURIComponent(search)}`;
        if (categorie) url += `&categorie=${categorie}`;
        if (onlyLowStock) url += `&stockFaible=true`;
        
        try {
            const res = await fetch(url, { 
                headers: { 'Authorization': `Bearer ${getToken()}` } 
            });
            if (!res.ok) throw new Error('Erreur chargement');
            
            const data = await res.json();
            let pieces = Array.isArray(data) ? data : (data.pieces || []);
            
            if (pieces.length === 0) {
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="8" class="empty-state">📭 Aucune pièce trouvée</td></tr>';
                return;
            }
            
            document.getElementById('tableBody').innerHTML = pieces.map(p => {
                let stockClass = '';
                let stockIcon = '';
                if (p.quantiteStock <= 0) {
                    stockClass = 'stock-low';
                    stockIcon = '❌ Rupture';
                } else if (p.quantiteStock <= p.seuilAlerte) {
                    stockClass = 'stock-warning';
                    stockIcon = '⚠️ Faible';
                } else {
                    stockClass = 'stock-normal';
                    stockIcon = '✅ OK';
                }
                
                return `
                    <tr>
                        <td><strong>${escapeHtml(p.code)}</strong></td>
                        <td>${escapeHtml(p.designation)}</td>
                        <td>${getCategorieIcon(p.categorie)} ${escapeHtml(p.categorie)}</td>
                        <td class="${stockClass}">${stockIcon} ${p.quantiteStock}</td>
                        <td>${p.seuilAlerte}</td>
                        <td>${Math.round(p.prixUnitaire || 0).toLocaleString()} FCFA</td>
                        <td>${escapeHtml(p.emplacement) || '-'}</td>
                        <td>
                            <button class="btn-mvt" onclick="openMvt(${p.id}, 'ENTRER')">➕ Entrée</button>
                            <button class="btn-mvt" onclick="openMvt(${p.id}, 'SORTIR')">➖ Sortie</button>
                            <button class="btn-edit" onclick="editPiece(${p.id})">✏️</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            await loadStats();
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('tableBody').innerHTML = 
                '<tr><td colspan="8" class="empty-state">❌ Erreur de chargement</td></tr>';
        }
    }

    function filterStockFaible() {
        onlyLowStock = !onlyLowStock;
        const btn = document.querySelector('.alert-btn');
        if (onlyLowStock) {
            btn.style.background = '#dc2626';
            btn.innerHTML = '📋 Voir tout';
        } else {
            btn.style.background = '#ef4444';
            btn.innerHTML = '⚠️ Alertes stock';
        }
        loadPieces();
    }

    function getCategorieIcon(categorie) {
        const icons = {
            'ELECTRONIQUE': '🖥️', 'MECANIQUE': '⚙️', 'CONSOMMABLE': '📦',
            'SONDE': '🔬', 'CABLE': '🔌', 'BATTERIE': '🔋', 'CARTE_MERE': '💻', 'AUTRE': '📌'
        };
        return icons[categorie] || '📦';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function debouncedSearch() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadPieces(), 500);
    }

    function openMvt(id, type) {
        currentPieceId = id;
        currentMvtType = type;
        document.getElementById('mvtTitle').innerHTML = type === 'ENTRER' ? '➕ Entrée en stock' : '➖ Sortie de stock';
        document.getElementById('mvtQuantite').value = '';
        document.getElementById('mvtMotif').value = '';
        document.getElementById('mvtModal').style.display = 'flex';
    }

    function closeMvtModal() {
        document.getElementById('mvtModal').style.display = 'none';
        currentPieceId = null;
        currentMvtType = null;
    }

    async function confirmerMouvement() {
        const quantite = document.getElementById('mvtQuantite').value;
        const motif = document.getElementById('mvtMotif').value.trim();
        
        if (!quantite || parseInt(quantite) <= 0) {
            alert('⚠️ Veuillez saisir une quantité valide');
            return;
        }
        if (!motif) {
            alert('⚠️ Veuillez saisir un motif');
            return;
        }
        
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="loader"></span> Enregistrement...';
        btn.disabled = true;
        
        try {
            const res = await fetch(`${API_URL}/stock/mouvement`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${getToken()}` 
                },
                body: JSON.stringify({
                    pieceId: currentPieceId,
                    type: currentMvtType,
                    quantite: parseInt(quantite),
                    motif: motif
                })
            });
            
            if (res.ok) {
                alert(currentMvtType === 'ENTRER' ? '✅ Entrée en stock enregistrée' : '✅ Sortie de stock enregistrée');
                closeMvtModal();
                loadPieces();
            } else {
                const error = await res.json();
                alert('❌ Erreur: ' + (error.message || 'Opération impossible'));
            }
        } catch (error) {
            alert('❌ Erreur de connexion');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    function editPiece(id) {
        window.location.href = `piece-form.html?id=${id}`;
    }

    function refreshAllData() {
        onlyLowStock = false;
        const btn = document.querySelector('.alert-btn');
        btn.style.background = '#ef4444';
        btn.innerHTML = '⚠️ Alertes stock';
        document.getElementById('searchInput').value = '';
        document.getElementById('categorieFilter').value = '';
        loadPieces();
    }

    // Événements
    document.getElementById('searchInput').addEventListener('keyup', debouncedSearch);
    document.getElementById('categorieFilter').addEventListener('change', loadPieces);

    loadSidebar();
    loadPieces();
</script>
</body>
</html>
