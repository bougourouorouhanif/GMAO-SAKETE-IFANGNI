<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1b5e20">
    <title>Inventaire - GMAO Sakété</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/assets/css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            color: #1b5e20;
            font-size: 24px;
        }

        .stats-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 15px 20px;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #1b5e20;
        }

        .stat-label {
            color: #64748b;
            font-size: 13px;
            margin-top: 5px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
            background: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-add {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add:hover {
            background: #2e7d32;
            transform: translateY(-2px);
        }

        .btn-export {
            background: #ffd600;
            color: #1b5e20;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .btn-export:hover {
            background: #ffeb3b;
            transform: translateY(-2px);
        }

        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .equipment-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .equipment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: white;
            padding: 16px;
            position: relative;
        }

        .card-header h3 {
            font-size: 18px;
            margin-bottom: 5px;
            padding-right: 80px;
        }

        .card-code {
            font-size: 11px;
            opacity: 0.8;
        }

        .status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-FONCTIONNEL { background: #22c55e; color: white; }
        .status-EN_PANNE { background: #ef4444; color: white; }
        .status-EN_MAINTENANCE { background: #f97316; color: white; }

        .card-body {
            padding: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .info-label { color: #64748b; }
        .info-value { font-weight: 500; }

        .card-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .btn-sm {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-edit {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-edit:hover { background: #cbd5e1; }

        .btn-qr {
            background: #3b82f6;
            color: white;
        }
        .btn-qr:hover { background: #2563eb; }

        .btn-history {
            background: #8b5cf6;
            color: white;
        }
        .btn-history:hover { background: #7c3aed; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal h2 {
            color: #1b5e20;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
            color: #334155;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            color: #94a3b8;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .page-btn:hover {
            background: #e8f5e9;
        }

        .page-btn.active {
            background: #1b5e20;
            color: white;
            border-color: #1b5e20;
        }

        .refresh-btn {
            background: #f0fdf4;
            border: 1px solid #1b5e20;
            color: #1b5e20;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .refresh-btn:hover {
            background: #1b5e20;
            color: white;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { margin-left: 0; padding: 70px 15px 15px 15px; }
            .equipment-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .stats-row { flex-direction: column; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <h1>📦 GESTION DE L'INVENTAIRE</h1>
        <div style="display: flex; gap: 10px;">
            <button class="refresh-btn" onclick="refreshAllData()" title="Rafraîchir">🔄</button>
            <button class="btn-export" onclick="exportToExcel()">📊 Exporter Excel</button>
            <button class="btn-add" onclick="openAddModal()">➕ Nouvel équipement</button>
        </div>
    </div>

    <div class="stats-row" id="statsContainer">
        <div class="stat-card"><div class="stat-number" id="totalEquip">-</div><div class="stat-label">Total équipements</div></div>
        <div class="stat-card"><div class="stat-number" id="fonctionnelEquip">-</div><div class="stat-label">✅ Fonctionnels</div></div>
        <div class="stat-card"><div class="stat-number" id="panneEquip">-</div><div class="stat-label">❌ En panne</div></div>
        <div class="stat-card"><div class="stat-number" id="maintenanceEquip">-</div><div class="stat-label">🔧 En maintenance</div></div>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher par nom, code, marque..." onkeyup="debouncedSearch()">
        <select id="serviceFilter" onchange="loadEquipements()">
            <option value="">📋 Tous services</option>
            <option value="URGENCES">🚨 Urgences</option>
            <option value="RADIOLOGIE">🩻 Radiologie</option>
            <option value="BLOC_OPERATOIRE">🏥 Bloc opératoire</option>
            <option value="PEDIATRIE">👶 Pédiatrie</option>
            <option value="MEDECINE_INTERNE">💊 Médecine interne</option>
            <option value="CHIRURGIE">🔪 Chirurgie</option>
            <option value="LABORATOIRE">🔬 Laboratoire</option>
            <option value="USI">💓 USI</option>
            <option value="REANIMATION">🫀 Réanimation</option>
            <option value="MAINTENANCE">🔧 Maintenance</option>
        </select>
        <select id="statutFilter" onchange="loadEquipements()">
            <option value="">📊 Tous statuts</option>
            <option value="FONCTIONNEL">✅ Fonctionnel</option>
            <option value="EN_PANNE">❌ En panne</option>
            <option value="EN_MAINTENANCE">🔧 Maintenance</option>
        </select>
        <select id="typeFilter" onchange="loadEquipements()">
            <option value="">📌 Tous types</option>
            <option value="IMAGERIE">🩻 Imagerie</option>
            <option value="MONITORING">📊 Monitoring</option>
            <option value="RESPIRATION">💨 Respiration</option>
            <option value="LABORATOIRE">🔬 Laboratoire</option>
            <option value="CHIRURGIE">🔪 Chirurgie</option>
        </select>
    </div>

    <div id="equipmentGrid" class="equipment-grid">
        <div class="empty-state">⏳ Chargement des équipements...</div>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<div id="equipmentModal" class="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
        <h2 id="modalTitle">Ajouter un équipement</h2>
        <form id="equipmentForm">
            <div class="form-row">
                <div class="form-group"><label>Nom *</label><input type="text" id="nom" required></div>
                <div class="form-group"><label>Code inventaire *</label><input type="text" id="codeInventaire" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Marque</label><input type="text" id="marque"></div>
                <div class="form-group"><label>Modèle</label><input type="text" id="modele"></div>
            </div>
            <div class="form-group"><label>Numéro de série</label><input type="text" id="numeroSerie"></div>
            <div class="form-row">
                <div class="form-group"><label>Type médical *</label>
                    <select id="typeMedical">
                        <option value="IMAGERIE">🩻 Imagerie</option>
                        <option value="MONITORING">📊 Monitoring</option>
                        <option value="RESPIRATION">💨 Respiration</option>
                        <option value="LABORATOIRE">🔬 Laboratoire</option>
                        <option value="CHIRURGIE">🔪 Chirurgie</option>
                        <option value="AUTRE">📌 Autre</option>
                    </select>
                </div>
                <div class="form-group"><label>Service *</label>
                    <select id="service">
                        <option value="URGENCES">🚨 Urgences</option>
                        <option value="RADIOLOGIE">🩻 Radiologie</option>
                        <option value="BLOC_OPERATOIRE">🏥 Bloc opératoire</option>
                        <option value="PEDIATRIE">👶 Pédiatrie</option>
                        <option value="MEDECINE_INTERNE">💊 Médecine interne</option>
                        <option value="CHIRURGIE">🔪 Chirurgie</option>
                        <option value="LABORATOIRE">🔬 Laboratoire</option>
                        <option value="USI">💓 USI</option>
                        <option value="REANIMATION">🫀 Réanimation</option>
                        <option value="MAINTENANCE">🔧 Maintenance</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Bâtiment</label><input type="text" id="batiment" placeholder="ex: Bâtiment A"></div>
                <div class="form-group"><label>Salle</label><input type="text" id="salle" placeholder="ex: Salle 101"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Date mise en service</label><input type="date" id="dateMiseService"></div>
                <div class="form-group"><label>Fin de garantie</label><input type="date" id="garantieFin"></div>
            </div>
            <div class="form-group"><label>Statut</label>
                <select id="statut">
                    <option value="FONCTIONNEL">✅ Fonctionnel</option>
                    <option value="EN_PANNE">❌ En panne</option>
                    <option value="EN_MAINTENANCE">🔧 En maintenance</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" class="btn-add" onclick="saveEquipment()">💾 Enregistrer</button>
                <button type="button" class="btn-sm" style="background:#e2e8f0;" onclick="closeModal()">Annuler</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
    let currentPage = 1;
    let currentEditId = null;
    let searchTimeout = null;
    const limit = 12;

    // Auth
    function getToken() { return localStorage.getItem('token'); }
    if (!getToken()) window.location.href = '/login.html';

    // Vérification rôle technicien
    const userRole = localStorage.getItem('userRole');
    if (userRole !== 'TECHNICIEN') window.location.href = '/soignant/index.html';

    // Sidebar
    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                // Marquer l'élément actif
                const links = document.querySelectorAll('.sidebar-item');
                links.forEach(link => {
                    if (link.getAttribute('href') === 'inventaire.html') {
                        link.classList.add('active');
                    }
                });
            })
            .catch(error => console.error('Erreur sidebar:', error));
    }

    // Statistiques
    async function loadStats() {
        try {
            const res = await fetch(`${API_URL}/equipements/stats`, { 
                headers: { 'Authorization': `Bearer ${getToken()}` } 
            });
            if (!res.ok) throw new Error('Erreur stats');
            const data = await res.json();
            document.getElementById('totalEquip').innerText = data.total || 0;
            document.getElementById('fonctionnelEquip').innerText = data.fonctionnel || 0;
            document.getElementById('panneEquip').innerText = data.panne || 0;
            document.getElementById('maintenanceEquip').innerText = data.maintenance || 0;
        } catch (error) { 
            console.error('Erreur stats:', error);
            // Fallback: calcul à partir de la liste
        }
    }

    // Chargement équipements
    async function loadEquipements() {
        const search = document.getElementById('searchInput').value;
        const service = document.getElementById('serviceFilter').value;
        const statut = document.getElementById('statutFilter').value;
        const type = document.getElementById('typeFilter').value;
        
        let url = `${API_URL}/equipements?page=${currentPage}&limit=${limit}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (service) url += `&service=${service}`;
        if (statut) url += `&statut=${statut}`;
        if (type) url += `&type=${type}`;
        
        try {
            const res = await fetch(url, { 
                headers: { 'Authorization': `Bearer ${getToken()}` } 
            });
            if (!res.ok) throw new Error('Erreur chargement');
            const data = await res.json();
            
            // Gestion des différents formats de réponse
            let equipements = [];
            let total = 0;
            if (Array.isArray(data)) {
                equipements = data;
                total = data.length;
            } else if (data.equipements) {
                equipements = data.equipements;
                total = data.total || equipements.length;
            } else {
                equipements = [];
                total = 0;
            }
            
            if (equipements.length === 0) {
                document.getElementById('equipmentGrid').innerHTML = '<div class="empty-state">📭 Aucun équipement trouvé</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            // Génération des cartes
            document.getElementById('equipmentGrid').innerHTML = equipements.map(e => `
                <div class="equipment-card" onclick="viewEquipment(${e.id})">
                    <div class="card-header">
                        <h3>${escapeHtml(e.nom)}</h3>
                        <div class="card-code">${escapeHtml(e.codeInventaire)}</div>
                        <div class="status-badge status-${e.statut}">${getStatusText(e.statut)}</div>
                    </div>
                    <div class="card-body">
                        <div class="info-row"><span class="info-label">Marque</span><span class="info-value">${escapeHtml(e.marque || '-')}</span></div>
                        <div class="info-row"><span class="info-label">Modèle</span><span class="info-value">${escapeHtml(e.modele || '-')}</span></div>
                        <div class="info-row"><span class="info-label">Service</span><span class="info-value">${escapeHtml(e.service || '-')}</span></div>
                        <div class="info-row"><span class="info-label">Type</span><span class="info-value">${getTypeText(e.typeMedical)}</span></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-sm btn-edit" onclick="event.stopPropagation();openEditModal(${e.id})">✏️ Modifier</button>
                        <button class="btn-sm btn-qr" onclick="event.stopPropagation();showQR(${e.id})">📱 QR Code</button>
                        <button class="btn-sm btn-history" onclick="event.stopPropagation();window.location.href='maintenances.html?equipement=${e.id}'">🔧 Historique</button>
                    </div>
                </div>
            `).join('');
            
            // Pagination
            const totalPages = Math.ceil(total / limit);
            if (totalPages > 1) {
                let paginationHtml = '';
                const startPage = Math.max(1, currentPage - 2);
                const endPage = Math.min(totalPages, currentPage + 2);
                
                if (startPage > 1) {
                    paginationHtml += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                    if (startPage > 2) paginationHtml += `<span class="page-btn">...</span>`;
                }
                for (let i = startPage; i <= endPage; i++) {
                    paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) paginationHtml += `<span class="page-btn">...</span>`;
                    paginationHtml += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
                }
                document.getElementById('pagination').innerHTML = paginationHtml;
            } else {
                document.getElementById('pagination').innerHTML = '';
            }
        } catch (error) {
            console.error('Erreur chargement:', error);
            document.getElementById('equipmentGrid').innerHTML = '<div class="empty-state">❌ Erreur de chargement. Vérifiez votre connexion.</div>';
        }
    }

    function getStatusText(statut) {
        const map = { 'FONCTIONNEL': '✅ Fonctionnel', 'EN_PANNE': '❌ Panne', 'EN_MAINTENANCE': '🔧 Maintenance' };
        return map[statut] || statut;
    }

    function getTypeText(type) {
        const map = { 'IMAGERIE': '🩻 Imagerie', 'MONITORING': '📊 Monitoring', 'RESPIRATION': '💨 Respiration', 'LABORATOIRE': '🔬 Laboratoire', 'CHIRURGIE': '🔪 Chirurgie' };
        return map[type] || type || '-';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function debouncedSearch() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1;
            loadEquipements();
        }, 500);
    }

    function goToPage(page) { 
        currentPage = page; 
        loadEquipements(); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function viewEquipment(id) { 
        window.location.href = `equipement-detail.html?id=${id}`; 
    }

    function openAddModal() { 
        currentEditId = null; 
        document.getElementById('modalTitle').innerText = '➕ Ajouter un équipement'; 
        document.getElementById('equipmentForm').reset(); 
        document.getElementById('equipmentModal').style.display = 'flex'; 
    }
    
    async function openEditModal(id) {
        try {
            const res = await fetch(`${API_URL}/equipements/${id}`, { 
                headers: { 'Authorization': `Bearer ${getToken()}` } 
            });
            if (!res.ok) throw new Error('Erreur chargement');
            const e = await res.json();
            currentEditId = id;
            document.getElementById('modalTitle').innerText = '✏️ Modifier équipement';
            document.getElementById('nom').value = e.nom || '';
            document.getElementById('codeInventaire').value = e.codeInventaire || '';
            document.getElementById('marque').value = e.marque || '';
            document.getElementById('modele').value = e.modele || '';
            document.getElementById('numeroSerie').value = e.numeroSerie || '';
            document.getElementById('typeMedical').value = e.typeMedical || 'IMAGERIE';
            document.getElementById('service').value = e.service || 'URGENCES';
            document.getElementById('batiment').value = e.batiment || '';
            document.getElementById('salle').value = e.salle || '';
            document.getElementById('dateMiseService').value = e.dateMiseService?.split('T')[0] || '';
            document.getElementById('garantieFin').value = e.garantieFin?.split('T')[0] || '';
            document.getElementById('statut').value = e.statut || 'FONCTIONNEL';
            document.getElementById('equipmentModal').style.display = 'flex';
        } catch (error) {
            alert('Erreur lors du chargement de l\'équipement');
        }
    }

    async function saveEquipment() {
        const data = {
            nom: document.getElementById('nom').value.trim(),
            codeInventaire: document.getElementById('codeInventaire').value.trim(),
            marque: document.getElementById('marque').value.trim(),
            modele: document.getElementById('modele').value.trim(),
            numeroSerie: document.getElementById('numeroSerie').value.trim(),
            typeMedical: document.getElementById('typeMedical').value,
            service: document.getElementById('service').value,
            batiment: document.getElementById('batiment').value.trim(),
            salle: document.getElementById('salle').value.trim(),
            dateMiseService: document.getElementById('dateMiseService').value || null,
            garantieFin: document.getElementById('garantieFin').value || null,
            statut: document.getElementById('statut').value
        };
        
        if (!data.nom || !data.codeInventaire) {
            alert('Veuillez remplir le nom et le code inventaire');
            return;
        }
        
        const url = currentEditId ? `${API_URL}/equipements/${currentEditId}` : `${API_URL}/equipements`;
        const method = currentEditId ? 'PUT' : 'POST';
        
        const btn = document.querySelector('#equipmentModal .btn-add');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="loader"></span> Enregistrement...';
        btn.disabled = true;
        
        try {
            const res = await fetch(url, { 
                method, 
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${getToken()}` 
                }, 
                body: JSON.stringify(data) 
            });
            
            if (res.ok) { 
                alert(currentEditId ? '✅ Équipement modifié avec succès' : '✅ Équipement ajouté avec succès'); 
                closeModal(); 
                loadEquipements(); 
                loadStats(); 
            } else {
                const error = await res.json();
                alert('❌ Erreur: ' + (error.message || 'Une erreur est survenue'));
            }
        } catch (error) {
            alert('❌ Erreur de connexion au serveur');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    function showQR(id) {
        const token = getToken();
        if (!token) {
            alert('Veuillez vous reconnecter');
            return;
        }
        // Ouvrir le QR code dans une nouvelle fenêtre
        const qrUrl = `${API_URL}/equipements/${id}/qr?token=${encodeURIComponent(token)}`;
        window.open(qrUrl, 'QRCode', 'width=500,height=700,toolbar=no,menubar=no,scrollbars=yes');
    }
    
    function closeModal() { 
        document.getElementById('equipmentModal').style.display = 'none'; 
    }

    async function exportToExcel() {
        try {
            const url = `${API_URL}/equipements/export-excel?token=${encodeURIComponent(getToken())}`;
            window.open(url, '_blank');
        } catch (error) {
            alert('Erreur lors de l\'export');
        }
    }

    function refreshAllData() {
        loadStats();
        loadEquipements();
    }

    // Initialisation
    loadSidebar();
    loadStats();
    loadEquipements();
</script>
</body>
</html>
