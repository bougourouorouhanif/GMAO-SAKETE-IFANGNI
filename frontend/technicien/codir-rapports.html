<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1b5e20">
    <title>Rapports CoDIR - GMAO Sakété</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/assets/css/design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header h1 {
            color: #1b5e20;
            font-size: 24px;
        }

        .btn-refresh {
            background: #f0fdf4;
            border: 1px solid #1b5e20;
            color: #1b5e20;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-refresh:hover { background: #1b5e20; color: white; }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .controls select, 
        .controls input {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .controls select:focus,
        .controls input:focus {
            outline: none;
            border-color: #1b5e20;
        }

        .btn-generate {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-generate:hover {
            background: #2e7d32;
            transform: translateY(-2px);
        }

        .btn-export {
            background: #ffd600;
            color: #1b5e20;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-export:hover {
            background: #ffeb3b;
            transform: translateY(-2px);
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: box-shadow 0.2s;
        }

        .section:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .section h3 {
            color: #1b5e20;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            font-size: 18px;
        }

        .section h4 {
            color: #334155;
            margin: 20px 0 10px 0;
            font-size: 16px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi-card {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            transition: transform 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
        }

        .kpi-value {
            font-size: 36px;
            font-weight: bold;
            color: #1b5e20;
        }

        .kpi-label {
            color: #64748b;
            margin-top: 5px;
            font-size: 13px;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            background: #22c55e;
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-fill-blue {
            background: #3b82f6;
        }

        .top-pannes-list {
            list-style: none;
            padding: 0;
        }

        .top-pannes-list li {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .panne-badge {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .alertes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .alerte-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }

        .alerte-card:hover {
            transform: translateY(-2px);
        }

        .alerte-icon {
            font-size: 28px;
        }

        .alerte-info {
            flex: 1;
        }

        .alerte-title {
            font-weight: bold;
            font-size: 14px;
        }

        .alerte-value {
            font-size: 24px;
            font-weight: bold;
            color: #1b5e20;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        .loader-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: #1b5e20;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            body { margin-left: 0; padding: 70px 15px 15px 15px; }
            .kpi-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls select, .controls input, .controls button { width: 100%; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <h1>📈 RAPPORTS CoDIR</h1>
        <button class="btn-refresh" onclick="refreshAllData()">🔄 Rafraîchir</button>
    </div>

    <div class="controls">
        <select id="moisSelect">
            <option value="1">Janvier</option>
            <option value="2">Février</option>
            <option value="3">Mars</option>
            <option value="4">Avril</option>
            <option value="5">Mai</option>
            <option value="6">Juin</option>
            <option value="7">Juillet</option>
            <option value="8">Août</option>
            <option value="9">Septembre</option>
            <option value="10">Octobre</option>
            <option value="11">Novembre</option>
            <option value="12">Décembre</option>
        </select>
        <input type="number" id="anneeSelect" value="2026" style="width: 100px;" min="2020" max="2030">
        <button class="btn-generate" onclick="loadRapport()">🔄 Générer rapport</button>
        <button class="btn-export" onclick="exportPDF()">📄 Exporter PDF</button>
        <button class="btn-export" onclick="exportExcel()">📊 Exporter Excel</button>
    </div>

    <div id="rapportContent">
        <div class="loader">
            <div class="loader-spinner"></div>
            <div>Chargement du rapport...</div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
    
    function getToken() { return localStorage.getItem('token'); }
    
    // Auth check
    if (!getToken()) window.location.href = '/login.html';
    
    const userRole = localStorage.getItem('userRole');
    if (userRole !== 'TECHNICIEN') window.location.href = '/soignant/index.html';

    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                const links = document.querySelectorAll('.sidebar-item');
                links.forEach(link => {
                    if (link.getAttribute('href') === 'codir-rapports.html') {
                        link.classList.add('active');
                    }
                });
            })
            .catch(error => console.error('Erreur sidebar:', error));
    }

    async function loadRapport() {
        const mois = document.getElementById('moisSelect').value;
        const annee = document.getElementById('anneeSelect').value;
        
        document.getElementById('rapportContent').innerHTML = `
            <div class="loader">
                <div class="loader-spinner"></div>
                <div>📊 Génération du rapport ${mois}/${annee}...</div>
            </div>
        `;
        
        try {
            const res = await fetch(`${API_URL}/codir/indicators?mois=${mois}&annee=${annee}`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            
            if (!res.ok) throw new Error('Erreur chargement rapport');
            
            const data = await res.json();
            const i = data.indicateurs || data;
            
            // Valeurs par défaut
            const disponibiliteGlobale = i.disponibilite?.globale ?? i.disponibiliteGlobale ?? 0;
            const mtbf = i.fiabilite?.mtbf ?? i.mtbf ?? 0;
            const mttr = i.fiabilite?.mttr ?? i.mttr ?? 0;
            const coutTotal = (i.maintenance?.coutTotal ?? i.coutTotal ?? 0);
            const tauxPreventif = i.maintenance?.tauxPreventif ?? i.tauxPreventif ?? 0;
            const tauxPannesCritiques = i.fiabilite?.tauxPannesCritiques ?? i.tauxPannesCritiques ?? 0;
            const stockFaible = i.alertes?.stockFaible ?? i.stockFaible ?? 0;
            const garantiesExpirant = i.alertes?.garantiesExpirant ?? i.garantiesExpirant ?? 0;
            
            // Par service
            const parService = i.disponibilite?.parService ?? i.parService ?? [];
            // Top équipements
            const topEquipements = i.topEquipementsPannes ?? i.topEquipements ?? [];
            
            document.getElementById('rapportContent').innerHTML = `
                <div class="section">
                    <h3>📊 Disponibilité des équipements</h3>
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-value">${disponibiliteGlobale.toFixed(1)}%</div>
                            <div class="kpi-label">Disponibilité globale</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.min(disponibiliteGlobale, 100)}%"></div>
                            </div>
                            <div style="font-size:12px; margin-top:5px; color: ${disponibiliteGlobale >= 95 ? '#16a34a' : '#f59e0b'}">
                                ${disponibiliteGlobale >= 95 ? '✅ Objectif OMS atteint' : '⚠️ Objectif OMS: 95%'}
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value">${mtbf.toFixed(1)} j</div>
                            <div class="kpi-label">MTBF (fiabilité)</div>
                            <div class="kpi-label" style="font-size:11px">Temps moyen entre pannes</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value">${mttr.toFixed(1)} h</div>
                            <div class="kpi-label">MTTR (réparabilité)</div>
                            <div class="kpi-label" style="font-size:11px">Temps moyen de réparation</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value">${Math.round(coutTotal).toLocaleString()} FCFA</div>
                            <div class="kpi-label">Coût total maintenance</div>
                            <div class="kpi-label" style="font-size:11px">Sur la période</div>
                        </div>
                    </div>
                    
                    ${parService.length > 0 ? `
                        <h4>🏥 Disponibilité par service</h4>
                        ${parService.map(s => `
                            <div style="margin-bottom: 12px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                    <strong>${escapeHtml(s.service || s.nom)}</strong>
                                    <span>${(s.disponibilite || 0).toFixed(1)}%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill progress-fill-blue" style="width: ${Math.min(s.disponibilite || 0, 100)}%"></div>
                                </div>
                            </div>
                        `).join('')}
                    ` : ''}
                </div>
                
                <div class="section">
                    <h3>🔝 Équipements les plus en panne</h3>
                    ${topEquipements.length > 0 ? `
                        <ul class="top-pannes-list">
                            ${topEquipements.map((e, idx) => `
                                <li>
                                    <span><strong>${idx + 1}.</strong> ${escapeHtml(e.equipmentNom || e.equipementNom || e.nom || '-')}</span>
                                    <span class="panne-badge">${e.nombrePannes || e.nbPannes || 0} panne(s)</span>
                                </li>
                            `).join('')}
                        </ul>
                    ` : '<p style="color:#94a3b8; text-align:center;">✅ Aucune panne enregistrée sur cette période</p>'}
                </div>
                
                <div class="section">
                    <h3>⚠️ Alertes et recommandations</h3>
                    <div class="alertes-grid">
                        <div class="alerte-card">
                            <div class="alerte-icon">⚠️</div>
                            <div class="alerte-info">
                                <div class="alerte-title">Stock faible</div>
                                <div class="alerte-value">${stockFaible}</div>
                                <div style="font-size:11px; color:#64748b;">Références sous seuil critique</div>
                            </div>
                        </div>
                        <div class="alerte-card">
                            <div class="alerte-icon">📅</div>
                            <div class="alerte-info">
                                <div class="alerte-title">Garanties expirant</div>
                                <div class="alerte-value">${garantiesExpirant}</div>
                                <div style="font-size:11px; color:#64748b;">Équipements concernés</div>
                            </div>
                        </div>
                        <div class="alerte-card">
                            <div class="alerte-icon">🔧</div>
                            <div class="alerte-info">
                                <div class="alerte-title">Taux préventif</div>
                                <div class="alerte-value">${tauxPreventif.toFixed(1)}%</div>
                                <div style="font-size:11px; color:#64748b;">Maintenances réalisées</div>
                            </div>
                        </div>
                        <div class="alerte-card">
                            <div class="alerte-icon">📊</div>
                            <div class="alerte-info">
                                <div class="alerte-title">Pannes critiques</div>
                                <div class="alerte-value">${tauxPannesCritiques.toFixed(1)}%</div>
                                <div style="font-size:11px; color:#64748b;">Impactant les soins</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h3>📋 Résumé exécutif</h3>
                    <p style="line-height: 1.8; color: #334155;">
                        <strong>Période :</strong> ${getMonthName(mois)} ${annee}<br><br>
                        La disponibilité globale des équipements est de <strong>${disponibiliteGlobale.toFixed(1)}%</strong>. 
                        ${disponibiliteGlobale >= 95 ? 'Ce résultat est conforme aux objectifs OMS.' : 'Des efforts sont nécessaires pour atteindre l\'objectif OMS de 95%.'}<br><br>
                        Le MTBF (fiabilité) est de <strong>${mtbf.toFixed(1)} jours</strong> et le MTTR (réparabilité) de <strong>${mttr.toFixed(1)} heures</strong>.<br><br>
                        Le coût total de maintenance sur la période s'élève à <strong>${Math.round(coutTotal).toLocaleString()} FCFA</strong>.<br><br>
                        ${stockFaible > 0 ? `⚠️ ${stockFaible} référence(s) de pièces détachées sont en stock faible et nécessitent une réapprovisionnement.` : ''}
                        ${garantiesExpirant > 0 ? `📅 ${garantiesExpirant} équipement(s) voient leur garantie expirer prochainement.` : ''}
                    </p>
                </div>
            `;
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('rapportContent').innerHTML = `
                <div class="loader">
                    <div style="color: #dc2626; font-size: 48px; margin-bottom: 15px;">❌</div>
                    <div>Erreur lors du chargement du rapport</div>
                    <div style="font-size: 12px; margin-top: 10px;">${error.message}</div>
                </div>
            `;
        }
    }

    function getMonthName(monthNumber) {
        const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 
                        'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
        return months[parseInt(monthNumber) - 1] || monthNumber;
    }

    function exportPDF() { 
        const mois = document.getElementById('moisSelect').value; 
        const annee = document.getElementById('anneeSelect').value; 
        window.open(`${API_URL}/codir/export-pdf?mois=${mois}&annee=${annee}&token=${encodeURIComponent(getToken())}`, '_blank'); 
    }
    
    function exportExcel() { 
        const mois = document.getElementById('moisSelect').value; 
        const annee = document.getElementById('anneeSelect').value; 
        window.open(`${API_URL}/codir/export-excel?mois=${mois}&annee=${annee}&token=${encodeURIComponent(getToken())}`, '_blank');
    }

    function refreshAllData() {
        loadRapport();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Définir le mois actuel par défaut
    const currentDate = new Date();
    document.getElementById('moisSelect').value = currentDate.getMonth() + 1;
    document.getElementById('anneeSelect').value = currentDate.getFullYear();

    loadSidebar();
    loadRapport();
</script>
</body>
</html>
