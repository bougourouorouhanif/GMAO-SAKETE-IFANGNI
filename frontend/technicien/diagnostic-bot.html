<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Expert - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e8f5e9; margin-left: 280px; padding: 20px; }
        .chat-container { background: white; border-radius: 20px; padding: 20px; height: 70vh; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .message { margin-bottom: 12px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content { padding: 10px 15px; border-radius: 18px; max-width: 70%; }
        .user .message-content { background: #0066FF; color: white; }
        .bot .message-content { background: #e2e8f0; color: #1e293b; }
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 30px; }
        .input-area button { background: #1b5e20; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; }
        @media (max-width: 768px) { body { margin-left: 0; } }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="main-content">
        <h1>🤖 Diagnostic Expert</h1>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot"><div class="message-content">👋 Bonjour ! Décrivez le problème technique...</div></div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Ex: Le respirateur ne s'allume pas...">
                <button onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
        
        function getToken() { return localStorage.getItem('token'); }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            input.value = '';
            try {
                const res = await fetch(`${API_URL}/chatbot/diagnostic`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                addMessage(data.reply || 'Réponse du chatbot', 'bot');
            } catch (error) {
                addMessage('❌ Erreur de connexion', 'bot');
            }
        }
        function addMessage(text, sender) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="message-content">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        fetch('/components/sidebar.html').then(r=>r.text()).then(html=>document.getElementById('sidebar-container').innerHTML=html);
        if(!getToken()) window.location.href='/login.html';
    </script>
</body>
</html>
