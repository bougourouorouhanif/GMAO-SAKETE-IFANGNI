<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0066FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#001f4d" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GMAO Mobile — Accueil</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/assets/css/design-system.css">

    <style>
        body {
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: var(--sp-6) var(--sp-4);
            color: #fff;
            background:
                radial-gradient(700px 400px at 0% 0%, rgba(255,255,255,0.18), transparent 60%),
                radial-gradient(600px 400px at 100% 100%, rgba(27,94,32,0.35), transparent 60%),
                linear-gradient(160deg, var(--brand-700) 0%, var(--brand-900) 100%);
        }

        .wrap {
            width: 100%; max-width: 380px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: var(--sp-4);
        }

        .logo {
            width: 96px; height: 96px;
            border-radius: var(--r-2xl);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            display: grid; place-items: center;
            font-size: 48px;
            box-shadow: var(--el-4);
            animation: float 4s var(--ease-in-out) infinite alternate;
        }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-6px); } }

        h1 {
            font-size: var(--fs-2xl); font-weight: var(--fw-bold);
            letter-spacing: -0.01em;
        }
        .subtitle { opacity: 0.85; font-size: var(--fs-sm); line-height: var(--lh-snug); }
        .hospital {
            font-size: var(--fs-xs); opacity: 0.85;
            padding: var(--sp-1) var(--sp-3);
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--r-full);
            backdrop-filter: blur(8px);
        }

        .actions { width: 100%; display: flex; flex-direction: column; gap: var(--sp-3); margin-top: var(--sp-3); }
        .btn-m {
            display: flex; align-items: center; justify-content: center; gap: var(--sp-2);
            padding: var(--sp-4);
            border-radius: var(--r-full);
            font-weight: var(--fw-semibold);
            font-size: var(--fs-base);
            text-decoration: none;
            transition: transform var(--dur-fast), box-shadow var(--dur-base);
            min-height: 52px;
        }
        .btn-m-primary { background: #fff; color: var(--brand-700); box-shadow: var(--el-3); }
        .btn-m-primary:hover { transform: translateY(-1px); box-shadow: var(--el-4); }
        .btn-m-outline {
            background: rgba(255,255,255,0.12); color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
        }
        .btn-m-outline:hover { background: rgba(255,255,255,0.2); }
        .btn-m:active { transform: scale(0.98); }

        .pwa-hint {
            display: inline-flex; align-items: center; gap: var(--sp-2);
            font-size: var(--fs-xs); opacity: 0.8;
            margin-top: var(--sp-4);
        }
        .version { font-size: 11px; opacity: 0.5; margin-top: var(--sp-2); }

        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
            animation: ping 2.4s var(--ease-out) infinite;
        }
        @keyframes ping {
            0%,100% { box-shadow: 0 0 0 4px rgba(34,197,94,0.25); }
            50%     { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
        }
    </style>
</head>
<body>

<main class="wrap">
    <div class="logo" aria-hidden="true">🏥</div>
    <h1>GMAO Sakété</h1>
    <p class="subtitle">Gestion de Maintenance<br>Assistée par Ordinateur</p>
    <span class="hospital"><span class="dot" aria-hidden="true"></span>&nbsp;Hôpital de Zone Sakété-Ifangni</span>

    <div class="actions">
        <a href="/login.html?mobile=true" class="btn-m btn-m-primary">🔐 Se connecter</a>
        <a href="/register.html?mobile=true" class="btn-m btn-m-outline">📝 Créer un compte</a>
    </div>

    <p class="pwa-hint">📱 Application optimisée mobile · installable PWA</p>
    <p class="version">v2.1.0 — GMAO Sakété</p>
</main>

<script>
    const token = localStorage.getItem('token');
    const userRole = localStorage.getItem('userRole');
    if (token && userRole) {
        if (userRole === 'TECHNICIEN') window.location.href = '/mobile/dashboard-mobile.html';
        else if (userRole === 'SOIGNANT') window.location.href = '/soignant/index.html';
    }
    if ('standalone' in window.navigator && window.navigator.standalone) console.log('PWA iOS');
    else if (window.matchMedia('(display-mode: standalone)').matches) console.log('PWA Android');
</script>
</body>
</html>
