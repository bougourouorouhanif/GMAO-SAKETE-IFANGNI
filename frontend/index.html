<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1b5e20">
    <title>GMAO Sakété - Hôpital de Zone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            background: #1b5e20;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            border: 2px solid #ffd600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1b5e20;
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            color: #2e7d32;
            font-size: 14px;
            margin-top: 8px;
        }

        .hospital-name {
            color: #ffd600;
            font-size: 13px;
            margin-top: 5px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-access {
            display: block;
            background: linear-gradient(135deg, #ffd600 0%, #ffb300 100%);
            color: #1b5e20;
            text-align: center;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-access:active {
            transform: scale(0.97);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
        }

        .footer a {
            color: #1b5e20;
            text-decoration: none;
            font-size: 12px;
            opacity: 0.7;
        }

        .footer a:hover {
            opacity: 1;
        }

        .version {
            color: #2e7d32;
            font-size: 10px;
            margin-top: 15px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-section">
        <div class="logo">🏥</div>
        <h1>GMAO Sakété</h1>
        <div class="subtitle">Gestion de Maintenance Assistée par Ordinateur</div>
        <div class="hospital-name">Hôpital de Zone Sakété-Ifangni</div>
    </div>

    <a href="/login.html" class="btn-access">🔐 Accéder à la plateforme</a>

    <div class="footer">
        <a href="/mobile/index.html">📱 Version mobile</a>
        <div class="version">Version 2.0 | GMAO Sakété-Ifangni</div>
    </div>
</div>

<script>
    // Vérifier si déjà connecté
    const token = localStorage.getItem('token');
    const userRole = localStorage.getItem('userRole');
    if(token && userRole) {
        if(userRole === 'TECHNICIEN') {
            window.location.href = '/technicien/dashboard.html';
        } else if(userRole === 'SOIGNANT') {
            window.location.href = '/soignant/index.html';
        }
    }
</script>
</body>
</html>
