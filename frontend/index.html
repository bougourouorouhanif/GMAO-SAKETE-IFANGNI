<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1a2a4f">
    <title>GMAO Sakété</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a4f 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .btn-access {
            display: block;
            background: linear-gradient(135deg, #00d4ff 0%, #3b82f6 100%);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.3s ease;
            margin-bottom: 30px;
        }

        .btn-access:active {
            transform: scale(0.97);
        }

        .footer {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
        }

        .footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🏥</div>
    <h1>GMAO Sakété</h1>
    <div class="subtitle">Gestion de Maintenance Assistée par Ordinateur<br>Hôpital de Zone Sakété-Ifangni</div>

    <a href="/login.html" class="btn-access">🔐 Accéder à la plateforme</a>

    <div class="footer">
        <a href="/mobile/index.html">📱 Version mobile</a>
    </div>
</div>

<script>
    // Vérifier si déjà connecté
    const token = localStorage.getItem('token');
    const userRole = localStorage.getItem('userRole');
    if(token && userRole) {
        if(userRole === 'TECHNICIEN') {
            window.location.href = '/technicien/dashboard.html';
        } else if(userRole === 'SOIGNANT') {
            window.location.href = '/soignant/index.html';
        }
    }
</script>
</body>
</html>
