name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: gmao
          POSTGRES_PASSWORD: gmao
          POSTGRES_DB: gmao_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://gmao:gmao@localhost:5432/gmao_test
      DATABASE_URL_TEST: postgresql://gmao:gmao@localhost:5432/gmao_test
      JWT_SECRET: ci-test-secret-not-used-in-prod
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci || npm install
      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Lint
        working-directory: backend
        run: npm run lint --if-present
      - name: Test
        working-directory: backend
        run: npm test --if-present

  frontend-check:
    name: Frontend HTML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifie fichiers HTML existent
        run: |
          test -f frontend/index.html
          test -f frontend/login.html
          test -d frontend/js
