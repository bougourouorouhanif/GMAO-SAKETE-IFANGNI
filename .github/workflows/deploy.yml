name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible déploiement'
        required: true
        default: 'all'
        type: choice
        options: [all, backend, frontend]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================
  # GATE: lint + test avant déploiement
  # ============================================
  gate:
    name: Tests pré-déploiement
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: gmao
          POSTGRES_PASSWORD: gmao
          POSTGRES_DB: gmao_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://gmao:gmao@localhost:5432/gmao_test
      JWT_SECRET: ci-deploy-gate-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci || npm install
        working-directory: backend
      - run: npx prisma generate
        working-directory: backend
      - run: npm run lint --if-present
        working-directory: backend
        continue-on-error: true
      - run: npm test --if-present
        working-directory: backend

  # ============================================
  # BACKEND → Render (deploy hook)
  # ============================================
  deploy-backend:
    name: Deploy backend (Render)
    needs: gate
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'backend'
    runs-on: ubuntu-latest
    environment:
      name: production-backend
      url: https://gmao-sakete-ifangni-1.onrender.com
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::Secret RENDER_DEPLOY_HOOK_URL manquant"
            exit 1
          fi
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json" \
            -w "\nHTTP %{http_code}\n"

      - name: Wait + smoke test healthcheck
        run: |
          URL="${{ vars.BACKEND_URL || 'https://gmao-sakete-ifangni-1.onrender.com' }}/api/health"
          echo "Attente déploiement Render (max 6 min)..."
          for i in $(seq 1 36); do
            sleep 10
            STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
            BODY=$(cat /tmp/health.json 2>/dev/null || echo '')
            echo "[$i/36] HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend OK"
              echo "$BODY" | head -c 500
              exit 0
            fi
          done
          echo "::error::Healthcheck KO après 6 min"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

  # ============================================
  # FRONTEND → Vercel
  # ============================================
  deploy-frontend:
    name: Deploy frontend (Vercel)
    needs: gate
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend'
    runs-on: ubuntu-latest
    environment:
      name: production-frontend
      url: https://gmao-sakete-ifangni.vercel.app
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier secrets Vercel
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Secrets manquants: VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull config Vercel (prod)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prod
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test frontend
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] && exit 0 || exit 1

  # ============================================
  # POST-DEPLOY: notification + tag
  # ============================================
  notify:
    name: Notification post-déploiement
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Statut
        run: |
          echo "Backend: ${{ needs.deploy-backend.result }}"
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          if [ "${{ needs.deploy-backend.result }}" = "failure" ] || [ "${{ needs.deploy-frontend.result }}" = "failure" ]; then
            echo "::error::Déploiement échoué"
            exit 1
          fi

      - name: Slack notify (optionnel)
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS_ICON="✅"
          [ "${{ needs.deploy-backend.result }}" != "success" ] && STATUS_ICON="❌"
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"$STATUS_ICON GMAO déploiement \`${{ github.sha }}\` — backend: ${{ needs.deploy-backend.result }}, frontend: ${{ needs.deploy-frontend.result }}\"}"
